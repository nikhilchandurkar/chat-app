# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Rate Limiting Zones (Limit connections per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# IP Blacklisting (Example: Block bad IPs)
map $remote_addr $is_blacklisted {
    default 0;
    # 192.168.1.100 1; # Add IPs to block here, followed by 1
}

server {
    listen 80;
    server_name nikhil-chats.chickenkiller.com;
    
    if ($is_blacklisted) {
        return 403;
    }

    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nikhil-chats.chickenkiller.com;

    if ($is_blacklisted) {
        return 403;
    }

    # SSL certificates (Certbot typically generates and places them at these paths)
    ssl_certificate /etc/letsencrypt/live/nikhil-chats.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nikhil-chats.chickenkiller.com/privkey.pem;
    
    # Optional but recommended SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Security header
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 1. Frontend (React App)
    location / {
        root /opt/chat-app/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Backend API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pass real client IP to the backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 3. Socket.io WebSockets
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        
        # Pass real client IP to the backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: disable buffering and extend timeouts for WebSockets
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
